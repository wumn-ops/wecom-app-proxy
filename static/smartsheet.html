<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生科生产域问题及需求统计</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #f0f4f8; color: #333; padding: 24px; }
.container { max-width: 720px; margin: 0 auto; }

h1 { font-size: 20px; text-align: center; margin-bottom: 24px; color: #1a3a5c; font-weight: 600; }

.summary { background: #e6f0fa; border: 1px solid #c4d8ee; border-radius: 8px; padding: 16px 24px; margin-bottom: 24px; text-align: center; }
.summary-label { font-size: 14px; color: #5a7a9a; }
.summary-num { font-size: 32px; font-weight: 700; color: #2c6fce; margin-top: 4px; }

table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
th { background: #d9e8f5; color: #2c5f8a; font-weight: 600; font-size: 13px; padding: 12px 10px; text-align: center; }
td { padding: 12px 10px; text-align: center; font-size: 14px; border-bottom: 1px solid #eef3f8; }
tr:last-child td { border-bottom: none; }
td:first-child { font-weight: 600; color: #2c5f8a; text-align: left; padding-left: 20px; }
td .num { color: #2c6fce; font-weight: 700; }

.loading { text-align: center; padding: 60px; color: #8aabc8; font-size: 15px; }
.error { text-align: center; padding: 40px; color: #e05050; }

.refresh-bar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.refresh-btn { padding: 5px 16px; background: #d9e8f5; color: #2c5f8a; border: 1px solid #b8cfe4; border-radius: 4px; font-size: 13px; cursor: pointer; }
.refresh-btn:hover { background: #c4d8ee; }
</style>
</head>
<body>
<div class="container">
  <h1>生科生产域问题及需求统计</h1>

  <div class="refresh-bar">
    <button class="refresh-btn" onclick="load()">刷新</button>
  </div>

  <div class="summary">
    <div class="summary-label">待解决问题总数</div>
    <div class="summary-num" id="pending-total">-</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>所属系统</th>
        <th>处理中</th>
        <th>待产品经理接收</th>
        <th>待用户验证/评价</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="4" class="loading">加载中...</td></tr>
    </tbody>
  </table>
</div>

<script>
async function load() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="4" class="loading">加载中...</td></tr>';

  try {
    const resp = await fetch('/api/v1/smartsheet/stats');
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || '请求失败');

    document.getElementById('pending-total').textContent = data.pending_total;

    tbody.innerHTML = data.rows.map(row => `
      <tr>
        <td>${esc(row.system)}</td>
        <td><span class="num">${row.processing}</span></td>
        <td><span class="num">${row.waiting_pm}</span></td>
        <td><span class="num">${row.waiting_verify}</span></td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="4" class="error">加载失败: ' + esc(e.message) + '</td></tr>';
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
</body>
</html>
